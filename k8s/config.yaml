---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: app
data:
  PORT: "3000"
  IDENTITY_URL: "http://identity-service.app.svc.cluster.local:3001"
  SALARY_URL: "http://salary-service.app.svc.cluster.local:3002"
  VOTE_URL: "http://vote-service.app.svc.cluster.local:3003"
  SEARCH_URL: "http://search-service.app.svc.cluster.local:3004"
  STATS_URL: "http://stats-service.app.svc.cluster.local:3005"
  SALARY_SERVICE_URL: "http://salary-service.app.svc.cluster.local:3002"
  NEXT_PUBLIC_BFF_URL: "/api/proxy"
---
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: app
type: Opaque
data:
  # Echo "supersecretjwt" | base64 -> c3VwZXJzZWNyZXRqd3QK
  JWT_SECRET: "c3VwZXJzZWNyZXRqd3Q=" # Note: use -n flag for echo -> c3VwZXJzZWNyZXRqd3Q=
---
apiVersion: v1
kind: Secret
metadata:
  name: db-secret
  namespace: data
type: Opaque
data:
  # admin -> YWRtaW4=, password -> cGFzc3dvcmQ=
  POSTGRES_USER: "YWRtaW4="
  POSTGRES_PASSWORD: "cGFzc3dvcmQ="
