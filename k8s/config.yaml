---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: app
data:
  PORT: "3000"
  DB_HOST: "postgres.data.svc.cluster.local"
  DB_PORT: "5432"
  DB_NAME: "techsalary"
  IDENTITY_URL: "http://identity-service:3001"
  SALARY_URL: "http://salary-service:3002"
  VOTE_URL: "http://vote-service:3003"
  SEARCH_URL: "http://search-service:3004"
  NEXT_PUBLIC_BFF_URL: "/api/proxy"
---
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: app
type: Opaque
data:
  # Echo "supersecretjwt" | base64 -> c3VwZXJzZWNyZXRqd3QK (roughly) using exact echo -n "supersecretjwt" | base64 -> c3VwZXJzZWNyZXRqd3Q=
  JWT_SECRET: "c3VwZXJzZWNyZXRqd3Q="
---
apiVersion: v1
kind: Secret
metadata:
  name: db-secret
  namespace: data
type: Opaque
data:
  # admin -> YWRtaW4=, password -> cGFzc3dvcmQ=
  POSTGRES_USER: "YWRtaW4="
  POSTGRES_PASSWORD: "cGFzc3dvcmQ="
